<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment UI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
  font-family: sans-serif;
  text-align: center;
}

.buy-btn {
  padding: 15px 30px;
  background: purple;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* Overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  top: 0;
  left: 0;
  display: none;
}

/* Modal */
.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  width: 400px;
  background: #111;
  color: white;
  border-radius: 15px;
  padding: 20px;
  opacity: 0;
  transition: 0.4s;
}

.modal.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.close {
  position: absolute;
  right: 10px;
  cursor: pointer;
}

/* Amount buttons */
.amounts button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, purple, violet);
  color: white;
  cursor: pointer;
}

/* Payment screen */
.payment {
  display: none;
  margin-top: 20px;
  display: flex;
}

.left {
  width: 40%;
  background: purple;
  padding: 20px;
  border-radius: 10px;
}

.right {
  width: 60%;
  padding: 20px;
}

/* Slide animation */
.payment.show {
  display: flex;
  animation: slide 0.5s ease;
}

@keyframes slide {
  from {
    transform: translateX(100%);
  }
  to {
    transform: translateX(0);
  }
}
  </style>
</head>
<body>

<button class="buy-btn" onclick="openModal()">Buy</button>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Modal -->
<div class="modal" id="modal">

  <span class="close" onclick="closeModal()">✖</span>

  <!-- STEP 1 -->
  <div class="step1" id="step1">
    <h2>Support Our Platform ❤️</h2>
    <p>Help us keep education free for everyone.</p>

    <div class="amounts">
      <button onclick="openPayment(49)">₹49</button>
      <button onclick="openPayment(69)">₹69</button>
      <button onclick="openPayment(99)">₹99</button>
      <button onclick="openPayment(149)">₹149</button>
      <button onclick="openPayment(499)">₹499</button>
      <button onclick="openPayment(999)">₹999</button>
      <button onclick="openPayment(1999)">₹1999</button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="payment" id="payment">
    
    <div class="left">
      <h3>Price Summary</h3>
      <h1 id="price">₹69</h1>
      <p>Using: +91 XXXXXXX</p>
    </div>

    <div class="right">
      <h3>Payment Options</h3>
      <p>UPI | Cards | Wallet</p>

      <div class="qr">
        <p>Scan QR</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=payment" />
      </div>
    </div>

  </div>

</div>

<script>function openModal() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("modal").classList.remove("show");
}

function openPayment(amount) {
  document.getElementById("price").innerText = "₹" + amount;
  document.getElementById("step1").style.display = "none";
  
  let payment = document.getElementById("payment");
  payment.classList.add("show");
}</script>
</body>
</html>
