<!DOCTYPE html>
<html>
<head>
  <title>Python Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    input {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }
    iframe {
      width: 100%;
      height: 300px;
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 Python Learning Platform</h1>
  <p id="userDisplay"></p>
  <p>Tokens: <span id="tokens">0</span> | Progress: <span id="progress">0%</span></p>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Login</button>
  </div>

  <!-- COURSE -->
  <div id="courseSection" style="display:none">

    <!-- VIDEO -->
    <div class="card">
      <h2>Python Lecture</h2>
      <button onclick="showVideo()">Watch Lecture</button>
      <div id="video"></div>
    </div>

    <!-- NOTES -->
    <div class="card">
      <h2>Notes</h2>
      <p id="notes">
        Python is a high-level programming language.  
        It is easy to learn and widely used in web development, AI, and data science.
      </p>
      <button onclick="markComplete()">Mark as Completed</button>
    </div>

    <!-- QUIZ -->
    <div class="card">
      <h2>Quiz</h2>
      <p>What is Python?</p>
      <button onclick="checkAnswer(true)">Programming Language</button>
      <button onclick="checkAnswer(false)">Snake</button>
      <p id="quizResult"></p>
    </div>

  </div>

</div>

<script>
let tokens = localStorage.getItem("tokens") || 0;
let progress = localStorage.getItem("progress") || 0;

document.getElementById("tokens").innerText = tokens;
document.getElementById("progress").innerText = progress + "%";

function login() {
  let user = document.getElementById("username").value;
  if(user === "") {
    alert("Enter name");
    return;
  }
  localStorage.setItem("user", user);
  document.getElementById("userDisplay").innerText = "Welcome " + user;
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("courseSection").style.display = "block";
}

function showVideo() {
  document.getElementById("video").innerHTML = `
    <iframe src="https://www.youtube.com/embed/rfscVS0vtbw" allowfullscreen></iframe>
  `;
}

function markComplete() {
  progress = parseInt(progress) + 30;
  tokens = parseInt(tokens) + 10;

  localStorage.setItem("progress", progress);
  localStorage.setItem("tokens", tokens);

  document.getElementById("progress").innerText = progress + "%";
  document.getElementById("tokens").innerText = tokens;
}

function checkAnswer(correct) {
  if(correct) {
    document.getElementById("quizResult").innerText = "Correct!";
    tokens = parseInt(tokens) + 20;
    progress = parseInt(progress) + 20;
  } else {
    document.getElementById("quizResult").innerText = "Wrong!";
  }

  localStorage.setItem("tokens", tokens);
  localStorage.setItem("progress", progress);

  document.getElementById("tokens").innerText = tokens;
  document.getElementById("progress").innerText = progress + "%";
}

// Auto login if already logged in
window.onload = function() {
  let user = localStorage.getItem("user");
  if(user) {
    document.getElementById("userDisplay").innerText = "Welcome " + user;
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("courseSection").style.display = "block";
  }
}
</script>

</body>
</html>
