    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f5576c;
            --success: #51cf66;
            --dark: #1a1a2e;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
            --shadow-hover: 0 30px 60px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: var(--light);
            overflow-x: hidden;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .token-display {
            background: var(--secondary-gradient);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
            min-width: 140px;
            justify-content: center;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: var(--primary-gradient);
            position: relative;
            overflow: hidden;
        }

            left: 0;
            right: 0;

            opacity: 0.3;
        }

        .hero-content {

            z-index: 2;
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);

            color: white;
            line-height: 1.1;

            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 3rem;
            box-shadow: var(--shadow);
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--success-gradient);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: transparent;
            color: white;

        .btn-secondary:hover {

        .hero-image {
            position: relative;

            transform: perspective(1000px) rotateY(-10deg);
        }

        /* Features Section */
        .features {
            padding: 120px 0;
            background: var(--white);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 6rem;
        }

        .section-title {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .section-subtitle {

            line-height: 1.7;

        .features-grid {

        .feature-card {
            background: var(--white);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            border: 1px solid #f1f5f9;
            height: 100%;
        }

        .feature-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-hover);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2rem;
            color: white;
            box-shadow: var(--shadow);
        }

        .feature-card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--dark);
        }

        /* Problem Solution */
        .problem-solution {
            padding: 120px 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .ps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .ps-card {
            background: var(--white);
            padding: 4rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .ps-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .ps-card.problem::before {
            background: linear-gradient(135deg, #ef4444, #f97316);
        }

        .ps-card.solution::before {
            background: var(--success-gradient);
        }

        .ps-card h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        .ps-list {
            list-style: none;
        }

        .ps-list li {
            padding: 1.5rem 0;
            font-size: 1.2rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            position: relative;
        }

        .ps-list li::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 0.5rem;
            flex-shrink: 0;
        }

        .ps-card.problem .ps-list li::before {
            background: #ef4444;
        }

        .ps-card.solution .ps-list li::before {
            background: var(--success);
        }

        /* Earn Section */
        .earn-section {
            padding: 120px 0;
            background: var(--primary-gradient);
            color: white;
        }

        .earn-form {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow);
        }

        .earn-form h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .earn-form p {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 3rem;
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-group input {
            width: 100%;
            padding: 1.5rem 2rem;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.9);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        /* Rewards Section */
        .rewards-section {
            padding: 120px 0;
            background: var(--white);
        }

        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .reward-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            border: 1px solid #f1f5f9;
        }

        .reward-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .reward-image {
            height: 200px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .reward-content {
            padding: 2.5rem;
        }

        .reward-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .reward-cost {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 1rem;
        }

        .locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .locked .reward-cost {
            color: #94a3b8;
        }

        /* Stats */
        .stats-section {
            padding: 80px 0;
            background: var(--primary-gradient);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .stat-item h3 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, white, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Footer */
        .footer {
            background: var(--dark);
            color: white;
            padding: 4rem 0 2rem;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer h3 {
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .footer-link {
            color: #94a3b8;
            text-decoration: none;
            display: block;
            margin-bottom: 0.75rem;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: white;
        }

        .footer-bottom {
            border-top: 1px solid #334155;
            padding-top: 2rem;
            text-align: center;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }

            .nav-menu {
                display: none;
            }

            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 2rem;
            }

            .ps-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .cta-buttons {
                justify-content: center;
            }
        }

        /* Animations */
        .animate__animated {
            animation-duration: 0.8s;
        }
    </style>
</head>
