<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
  margin: 0;
  padding: 40px;
}

.container {
  display: flex;
  gap: 30px;
  justify-content: center;
}

/* CARD */
.card {
  width: 250px;
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* TOP */
.top {
  background: linear-gradient(135deg, #5f9cff, #4facfe);
  height: 150px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.top h1 {
  color: white;
  font-size: 40px;
}

.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #1e3a8a;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* BOTTOM */
.bottom {
  padding: 20px;
  text-align: center;
}

.bottom h3 {
  margin: 10px 0;
}

.bottom p {
  color: gray;
  font-size: 14px;
}

.bottom h2 {
  color: #00b894;
  margin: 10px 0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #007bff;
}
    </style>
</head>
<body>
    <div class="container">

  <div class="card">
    <div class="top">
      <span class="badge">🔒 LOCKED</span>
      <h1>1</h1>
    </div>
    <div class="bottom">
      <h3>Python Basics</h3>
      <p>Variables, Data Types, Operators</p>
      <h2>0.01 ETH</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="card">
    <div class="top">
      <span class="badge">🔒 LOCKED</span>
      <h1>2</h1>
    </div>
    <div class="bottom">
      <h3>Functions & Loops</h3>
      <p>Master functions, loops, conditionals</p>
      <h2>0.02 ETH</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="card">
    <div class="top">
      <span class="badge">🔒 LOCKED</span>
      <h1>3</h1>
    </div>
    <div class="bottom">
      <h3>OOP in Python</h3>
      <p>Classes, Objects, Inheritance</p>
      <h2>0.03 ETH</h2>
      <button>Buy Now</button>
    </div>
  </div>

</div>
</body>
</html>
